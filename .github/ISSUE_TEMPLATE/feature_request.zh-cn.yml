name: 功能请求
description: 为 Shulker Panel 提出想法或改进建议
title: "[功能]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请描述问题背景和你期望达成的效果。
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 简要描述想法。
      placeholder: 功能请求的简短说明。
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个需求解决了什么痛点？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 说明你希望的实现方式或行为。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如有，请说明你考虑过的其他方案。
  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息
      description: 可补充原型、示例或相关链接。