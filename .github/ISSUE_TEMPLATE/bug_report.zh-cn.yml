name: 缺陷报告
description: 报告 Shulker Panel 中可复现的问题
title: "[缺陷]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请填写以下信息，帮助我们尽快复现并修复问题。
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 简要描述问题。
      placeholder: 问题的简短描述。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最小可复现步骤。
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 正常情况下应该发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code
      placeholder: 1.118.x
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: 扩展版本
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: workspace-files
    attributes:
      label: 相关工作区文件
      description: 列出涉及的文件、目录或任务。
      placeholder: |
        src/extension.ts
        shulker/tasks/example.lvt
  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息
      description: 可补充日志、截图或其他有帮助的信息。