name: Bug report
description: Report a reproducible problem in Shulker Panel
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please fill in the details below so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue briefly.
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence of steps.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VS Code
      placeholder: 1.118.x
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: workspace-files
    attributes:
      label: Related workspace files
      description: List files, folders, or tasks involved.
      placeholder: |
        src/extension.ts
        shulker/tasks/example.lvt
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add logs, screenshots, or anything else that helps.